# config.yaml
# ── 注意 ──────────────────────────────────────────────
# 敏感信息（API Key / 密码）请通过 .env 文件或系统环境变量配置。
# 本文件中对应字段留空即可，程序会自动从环境变量读取。
# 详见 .env.example 和 app/core/config_manager.py
# ──────────────────────────────────────────────────────
app:
  name: "Ai_Blogger"
  version: "1.0.0"
  logfile_path: "./Log_File"
  temp_path: "./Data/temp"    # 临时文件路径
  base_driver_path: "./driver/playwright_data"  # 基础驱动路径
  log_level: "INFO"
  debug_mode: false
  max_workers: 4

api:
  deepseek:
    api_key: "${DEEPSEEK_API_KEY}"   # ← 从环境变量读取
    base_url: "https://api.deepseek.com"
    max_tokens: 1024
    timeout: 60
    retry_attempts: 3

platforms:
  zhihu:
    login_type: "username_and_password"   # 登录方式，可选值："username_and_password"或"qrcode"
    user_name: "${ZHIHU_USERNAME}"         # ← 从环境变量读取
    password: "${ZHIHU_PASSWORD}"          # ← 从环境变量读取
    check_interval: 600  # 监控间隔，秒数
    login_timeout: 60000  # 登录超时时间，单位毫秒
    element_timeout: 3000  # 元素等待超时时间，单位毫秒

    model:
      name: "deepseek-v4-flash"
      temperature: 0.7

    tools:
      get_internet_data:
        enabled: true
      create_image:
        enabled: true
        provider: "Qwen"
        model_name: "qwen-image-2.0"
        api_key: "${QWEN_API_KEY}"         # ← 从环境变量读取

    urls:
      hot_list: "https://www.zhihu.com/hot"
      login: "https://www.zhihu.com/signin?next=%2F"
      write: "https://zhuanlan.zhihu.com/write"


    # 文件路径设置
    paths:
      hot_title_file: "./Data/zhihu_hot_titles.json"  # 热门标题文件
      storage_state: "./driver/playwright_data/zhihu_data/storage_state.json"
      essay_file_json: "./Data/zhihu_essays.json"  # 知乎推文json文件
      essay_file_md: "./Data/zhihu_essays_md"  # 知乎推文md文件
      image_path: "./Data/zhihu_images/"  # 知乎推文图片路径


  weibo:
    login_type: "username_and_password"   # 登录方式，可选值："username_and_password"或"qrcode"
    user_name: "${WEIBU_USERNAME}"          # ← 从环境变量读取
    password: "${WEIBU_PASSWORD}"           # ← 从环境变量读取
    check_interval: 600  # 监控间隔，秒数
    login_timeout: 60000  # 登录超时时间，单位毫秒
    element_timeout: 3000  # 元素等待超时时间，单位毫秒

    model:
      name: "deepseek-v4-flash"
      temperature: 0.7

    tools:
      get_internet_data:
        enabled: true
      create_image:
        enabled: false
        provider: "Qwen"
        model_name: "qwen-image-2.0"
        api_key: "${QWEN_API_KEY}"         # ← 从环境变量读取

    urls:
      hot_list: "https://weibo.com/hot/search"
      login: "https://passport.weibo.com/sso/signin"
      send_essay: "https://card.weibo.com/article/v5/editor#/draft"


    paths:
      hot_title_file: "./Data/weibo_hot_titles.json"  # 热门标题文件
      storage_state: "./driver/playwright_data/weibo_data/storage_state.json"
      essay_file_json: "./Data/weibo_essays.json"  # 微博推文json文件
      essay_file_md: "./Data/weibo_essays_md"  # 微博推文md文件
      image_path: "./Data/weibo/"  # 微博推文图片路径

# 内容生成流水线配置
content_pipeline:
  # 竞品分析 - 是否抓取各平台同话题下的高赞内容做参考
  competition_platform:
    zhihu:
      enabled: true
      max_content: 1
      max_comments: 0
    weibo:
      enabled: true
      max_content: 1
      max_comments: 0


prompts:
  auto_optimize: false      # AI 自动优化开关 (第一阶段关闭)
  optimize_interval_days: 7               # 自动优化间隔天数

  # 用户自定义覆盖开关
  custom_override:
    zhihu_answer:
      enabled: false        # 设为 true 并编辑 prompts/custom/zhihu_answer.json 即可覆盖
    zhihu_article:
      enabled: false
    weibo_article:
      enabled: false
